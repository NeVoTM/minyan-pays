# Optional local PostgreSQL for development (Prisma uses PostgreSQL).
# Start: docker compose up -d
# DATABASE_URL=postgresql://minyan:minyan@localhost:5432/minyan_pays
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: minyan
      POSTGRES_PASSWORD: minyan
      POSTGRES_DB: minyan_pays
