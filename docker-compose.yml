services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: minyan
      POSTGRES_PASSWORD: minyan_dev
      POSTGRES_DB: minyan_pays
    volumes:
      - minyan_pg:/var/lib/postgresql/data

volumes:
  minyan_pg:
