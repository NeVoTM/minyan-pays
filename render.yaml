# Render Blueprint — apply in dashboard: New → Blueprint → connect repo.
# Set secrets in the UI: DATABASE_URL (or link existing Postgres), ADMIN_PASSWORD, JWT_SECRET, WEB_ORIGIN, VITE_API_BASE_URL.
# https://render.com/docs/blueprint-spec

version: "1"
services:
  - type: web
    name: minyan-pays-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: DEFAULT_TIMEZONE
        value: America/New_York

  - type: web
    name: minyan-pays-web
    runtime: static
    region: oregon
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_BASE_URL
        sync: false
