# Render Blueprint — apply in dashboard: New → Blueprint → connect repo.
# API secrets: DATABASE_URL, JWT_SECRET, WEB_ORIGIN (comma-separated origins),
# ADMIN_BOOTSTRAP_PASSWORD or ADMIN_PASSWORD (optional overrides for default bootstrap 11213Aron when org has no adminPasswordHash).
# RABBI_PASSWORD (fallback if org has no rabbiPasswordHash).
# GMAIL_USER + GMAIL_APP_PASSWORD: enable email confirmation on global admin
# password change. The 16-char App Password must be generated by the
# Google-account owner at https://myaccount.google.com/apppasswords (Google
# never shows it to anyone but the logged-in user) and pasted into Render.
# ADMIN_NOTIFY_EMAIL: optional override for the default elichalfinny@gmail.com.
# ADMIN_PASSWORD_VERIFICATION_ECHO=1: dev-only escape hatch that returns the
# 6-digit code in the API response when GMAIL_* are not set.
# Static site: VITE_API_BASE_URL must be the API origin (e.g. https://minyan-pays.onrender.com) — required at build time.
# Publish path is relative to rootDir: apps/web → dist means apps/web/dist (not repo-root dist).
# https://render.com/docs/blueprint-spec

version: "1"
services:
  - type: web
    name: minyan-pays-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    # db push in build: works even if dashboard pre-deploy is wrong/outdated (DATABASE_URL is available on Render builds).
    # pre-deploy: second push is a no-op; seed still runs for empty DBs.
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    preDeployCommand: npx prisma db push --accept-data-loss && npm run db:seed
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RABBI_PASSWORD
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_NOTIFY_EMAIL
        sync: false
      - key: DEFAULT_TIMEZONE
        value: America/New_York

  - type: web
    name: minyan-pays-web
    runtime: static
    region: oregon
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_BASE_URL
        sync: false
