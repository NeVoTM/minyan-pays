# Render Blueprint — apply in dashboard: New → Blueprint → connect repo.
# API secrets: DATABASE_URL, JWT_SECRET, WEB_ORIGIN (comma-separated origins),
# ADMIN_BOOTSTRAP_PASSWORD or ADMIN_PASSWORD (optional overrides for default bootstrap 11213Aron when org has no adminPasswordHash).
# RABBI_PASSWORD (fallback if org has no rabbiPasswordHash).
# Static site: VITE_API_BASE_URL must be the API origin (e.g. https://minyan-pays.onrender.com) — required at build time.
# Publish path is relative to rootDir: apps/web → dist means apps/web/dist (not repo-root dist).
# https://render.com/docs/blueprint-spec

version: "1"
services:
  - type: web
    name: minyan-pays-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    # NOTE (May 2026): --accept-data-loss is needed for the one-time push that adds
    # Rabbi.passwordPlain @unique + Shamosh table. Once production is in sync, revert
    # this line back to `npx prisma db push` (no flag) so Prisma still guards future
    # destructive schema changes.
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RABBI_PASSWORD
        sync: false
      - key: DEFAULT_TIMEZONE
        value: America/New_York

  - type: web
    name: minyan-pays-web
    runtime: static
    region: oregon
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_BASE_URL
        sync: false
