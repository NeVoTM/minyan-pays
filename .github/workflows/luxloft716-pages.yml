name: Deploy LuxLoft716 to GitHub Pages

# Marketing site at https://nevotm.github.io/minyan-pays/
# Same deploy pattern as Slinkys (.github/workflows/slinkys-pages.yml)

on:
  push:
    branches: [main]
    paths:
      - 'luxloft716/**'
      - '.github/workflows/luxloft716-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: luxloft716-github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxloft716
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: luxloft716/package-lock.json

      - run: npm ci
      - run: npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: luxloft716/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
