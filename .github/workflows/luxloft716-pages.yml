name: Deploy LuxLoft716 to GitHub Pages

# Publishes to gh-pages branch → https://nevotm.github.io/minyan-pays/
# Requires: Settings → Pages → Deploy from branch → gh-pages / root

on:
  push:
    branches: [main]
    paths:
      - 'luxloft716/**'
      - '.github/workflows/luxloft716-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxloft716
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: luxloft716/package-lock.json

      - run: npm ci
      - run: npm run build:pages

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./luxloft716/dist
          publish_branch: gh-pages
          commit_message: 'Deploy LuxLoft716 — ${{ github.sha }}'
