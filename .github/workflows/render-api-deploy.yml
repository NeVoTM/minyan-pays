# Trigger a Render deploy for minyan-pays-api using GitHub repository secrets.
# iPhone: GitHub app → Actions → "Render API deploy" → Run workflow
#
# Required secrets (Settings → Secrets and variables → Actions):
#   RENDER_API_KEY
# Optional variable:
#   RENDER_API_SERVICE_ID  (default: srv-d7pbfg8sfn5c73de2q00)

name: Render API deploy

on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: "Clear Render build cache before deploy"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ vars.RENDER_API_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::Missing repository secret RENDER_API_KEY"
            exit 1
          fi
          echo "SERVICE_ID=${RENDER_API_SERVICE_ID:-srv-d7pbfg8sfn5c73de2q00}" >> "$GITHUB_ENV"

      - name: Fix pre-deploy command (clears dashboard override)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          # Stale dashboard preDeploy (e.g. prisma db push) causes pre_deploy_failed.
          curl -fsS -X PATCH \
            "https://api.render.com/v1/services/${SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"serviceDetails":{"preDeployCommand":"true"}}'
          echo "preDeployCommand set to true (no-op)."

      - name: Trigger deploy
        id: trigger
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          CLEAR="${{ inputs.clear_cache }}"
          if [ "$CLEAR" = "true" ]; then CACHE_JSON='"clearCache":"clear"'; else CACHE_JSON='"clearCache":"do_not_clear"'; fi
          RESP=$(curl -fsS -X POST \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{${CACHE_JSON}}")
          echo "$RESP"
          DEPLOY_ID=$(echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id') or d.get('deploy',{}).get('id',''))")
          if [ -z "$DEPLOY_ID" ]; then
            echo "::error::Could not parse deploy id from response"
            exit 1
          fi
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          DEPLOY_ID="${{ steps.trigger.outputs.deploy_id }}"
          for i in $(seq 1 60); do
            BODY=$(curl -fsS \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")
            STATUS=$(echo "$BODY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status') or d.get('deploy',{}).get('status',''))")
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              live) echo "Deploy succeeded."; exit 0 ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "$BODY"
                echo "::error::Deploy failed: $STATUS"
                exit 1
                ;;
            esac
            sleep 20
          done
          echo "::error::Timed out waiting for deploy"
          exit 1

      - name: Health and locations check
        run: |
          ok=0
          for i in 1 2 3 4 5 6; do
            HCODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 30 \
              https://minyan-pays.onrender.com/api/health || echo 000)
            OCODE=$(curl -sS -o /tmp/orgs.json -w "%{http_code}" --max-time 30 \
              https://minyan-pays.onrender.com/api/public/organizations || echo 000)
            echo "[$i] health=$HCODE $(head -c 120 /tmp/health.json)"
            echo "[$i] orgs=$OCODE $(head -c 120 /tmp/orgs.json)"
            if [ "$HCODE" = "200" ] && echo "$(cat /tmp/health.json)" | grep -q '"db"'; then
              ok=1
            fi
            if [ "$OCODE" = "200" ]; then
              echo "Locations endpoint OK."
              exit 0
            fi
            if [ "$OCODE" = "503" ] && [ "$ok" = "1" ]; then
              echo "::warning::API is up but database unreachable (health db:false or orgs 503). Fix Render Postgres DATABASE_URL."
              exit 1
            fi
            sleep 15
          done
          echo "::error::API did not become healthy with new build"
          exit 1
